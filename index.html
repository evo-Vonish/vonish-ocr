<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VonishOCR</title>
  </head>
  <body>
    <!-- 启动页加载动画，Vue 挂载后自动隐藏 -->
    <div id="splash">
      <div class="splash-dot"></div>
      <div class="splash-text">VonishOCR</div>
    </div>
    <div id="app"></div>
    <!-- 5 秒硬超时：即使 Vue 挂载失败也强制隐藏 splash -->
    <script>
      setTimeout(() => {
        const s = document.getElementById('splash');
        if (s) { s.classList.add('hidden'); setTimeout(() => s.remove(), 400); }
      }, 5000);
      // 全局错误捕获，显示在页面上方便诊断
      window.onerror = (msg, url, line) => {
        const e = document.createElement('div');
        e.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#d32f2f;color:#fff;padding:12px;font-size:12px;z-index:99999;white-space:pre-wrap;';
        e.textContent = 'JS Error: ' + msg + ' at ' + url + ':' + line;
        document.body.appendChild(e);
      };
      window.addEventListener('unhandledrejection', (ev) => {
        const e = document.createElement('div');
        e.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#d32f2f;color:#fff;padding:12px;font-size:12px;z-index:99999;white-space:pre-wrap;';
        e.textContent = 'Unhandled Rejection: ' + ev.reason;
        document.body.appendChild(e);
      });
    </script>
    <script type="module" src="/src/main.js"></script>
    <style>
      #splash {
        position: fixed;
        inset: 0;
        background: #0a0a0f;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 99999;
        transition: opacity 0.4s ease;
      }
      #splash.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .splash-dot {
        width: 16px;
        height: 16px;
        background: #00ff88;
        border-radius: 50%;
        animation: splash-pulse 1.2s ease-in-out infinite;
        box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
      }
      .splash-text {
        margin-top: 24px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 18px;
        font-weight: 600;
        color: #fff;
        letter-spacing: 2px;
        animation: splash-fade 1.5s ease-in-out infinite alternate;
      }
      @keyframes splash-pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.5); opacity: 0.6; }
      }
      @keyframes splash-fade {
        0% { opacity: 0.5; }
        100% { opacity: 1; }
      }
    </style>
  </body>
</html>
